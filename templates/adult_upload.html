<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adult Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="shortcut icon" type="image/png"
          href="https://logomaker.designfreelogoonline.com/media/productdesigner/logo/resized/1286_bird-02.png"/>
</head>

<body class="bg-[url('https://ionetworks.co/images/2021/product/526_%E8%BD%89%E6%8F%9B-01.png')] bg-no-repeat bg-cover bg-center bg-fixed">

<header class="absolute inset-x-0 top-0 z-50">
    <nav class="flex items-center justify-between p-6 lg:px-8">
        <div class="flex items-center">
            <img class="h-8 w-auto rounded-full"
                 src="https://logomaker.designfreelogoonline.com/media/productdesigner/logo/resized/1286_bird-02.png">
            <span class="text-transparent bg-clip-text bg-gradient-to-tr from-[#211f4e] to-[#1ec3c0] px-2 font-bold font-serif text-lg">
                UR ~>
            </span>
        </div>

        <div class="hidden lg:flex lg:gap-x-12">
            <a href="/" class="text-transparent bg-clip-text bg-gradient-to-tr from-[#ff5cf4] to-[#00fbff] uppercase font-extrabold text-sm">
                Home
            </a>
            <span class="text-gray-300 uppercase font-extrabold text-sm">Adult Detection</span>
        </div>
    </nav>
</header>

<div class="flex h-screen w-full items-center justify-center">
    <div class="rounded-xl bg-gray-800 bg-opacity-55 px-16 py-10 backdrop-blur-md shadow-2xl shadow-black hover:shadow-blue-500">

        <div class="text-white text-center">
            <img src="https://logomaker.designfreelogoonline.com/media/productdesigner/logo/resized/1286_bird-02.png"
                 width="120" class="rounded-full mx-auto mb-6"/>

            <p class="text-transparent bg-clip-text bg-gradient-to-tr from-[#ff5cf4] to-[#00fbff] uppercase font-serif font-extrabold">
                Upload an adult face image
            </p>

            <form method="POST" enctype="multipart/form-data"
                  action="/adult_result" class="mt-8">

                <input type="file" name="image" accept="image/*" required
                       class="rounded-lg bg-blue-500 py-3 px-6 text-xs font-bold uppercase text-white hover:bg-white hover:text-blue-500 transition-all"/>

                <div class="mt-8">
                    <input type="submit" value="Analyze"
                           class="font-serif font-extrabold py-3 px-8 rounded-lg bg-blue-500 hover:bg-white text-xs uppercase text-white hover:text-blue-500 transition-all">
                </div>
            </form>

            <!-- Loading Button -->
            <div class="mt-6">
                <button id="loader" style="display:none;"
                        class="py-2 px-5 text-sm bg-white rounded-lg inline-flex items-center">
                    Processing...
                </button>
            </div>

        </div>
    </div>
</div>

{% include 'footer.html' %}

<script>
document.querySelector("form").addEventListener("submit", function(){
    document.getElementById("loader").style.display = "inline-flex";
});
</script>

</body>
</html>
