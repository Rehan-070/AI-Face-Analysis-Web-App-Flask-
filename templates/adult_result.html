<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Adult Result</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-[url('https://images.unsplash.com/photo-1638864616275-9f0b291a2eb6?fm=jpg&q=60&w=3000')] bg-cover bg-center bg-fixed">

<header class="absolute inset-x-0 top-0 z-50">
<nav class="flex items-center justify-between p-6 lg:px-8">
<div class="flex items-center">
<img class="h-8 rounded-full"
src="https://logomaker.designfreelogoonline.com/media/productdesigner/logo/resized/1286_bird-02.png">
<span class="text-transparent bg-clip-text bg-gradient-to-tr from-[#211f4e] to-[#1ec3c0] px-2 font-bold font-serif text-lg">
UR ~>
</span>
</div>

<a href="/" class="text-transparent bg-clip-text bg-gradient-to-tr from-[#ff5cf4] to-[#00fbff] uppercase font-extrabold text-sm">
Home
</a>
</nav>
</header>

<section class="pt-32 text-center">

<!-- Uploaded Image -->
<img src="/{{ image }}" class="w-40 h-40 rounded-full mx-auto border-4 border-white shadow-xl">

<h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-tr from-[#ff5cf4] to-[#00fbff] mt-6">
ADULT ANALYSIS
</h1>

<!-- 2 COLUMN GRID -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-10 mt-16 px-16">

<!-- GENDER BLOCK -->
<div class="bg-white p-6 rounded-xl shadow-2xl hover:shadow-blue-400 transition duration-300">
<h3 class="font-bold text-gray-700 mb-4 text-xl">Gender Analysis</h3>

<p class="text-lg font-bold text-gray-800 mb-2">
Detected: {{ gender }} ({{ gen_conf }}%)
</p>

<canvas id="genderChart"></canvas>
</div>

<!-- EMOTION BLOCK -->
<div class="bg-white p-6 rounded-xl shadow-2xl hover:shadow-pink-400 transition duration-300">
<h3 class="font-bold text-gray-700 mb-4 text-xl">Emotion Analysis</h3>

<p class="text-lg font-bold text-gray-800 mb-2">
Detected: {{ emotion }} ({{ emo_conf }}%)
</p>

<canvas id="emotionChart"></canvas>
</div>

</div>

</section>

{% include 'footer.html' %}

<script>

// Labels
const genderLabels = ["Male", "Female", "Transgender"];
const emotionLabels = ["Angry", "Happy", "Sad"];

// Initialize arrays with 0
let genderData = [0, 0, 0];
let emotionData = [0, 0, 0];

// Fill only detected gender
if ("{{ gender }}" === "Male") genderData[0] = {{ gen_conf }};
if ("{{ gender }}" === "Female") genderData[1] = {{ gen_conf }};
if ("{{ gender }}" === "Transgender") genderData[2] = {{ gen_conf }};

// Fill only detected emotion
if ("{{ emotion }}" === "Angry") emotionData[0] = {{ emo_conf }};
if ("{{ emotion }}" === "Happy") emotionData[1] = {{ emo_conf }};
if ("{{ emotion }}" === "Sad") emotionData[2] = {{ emo_conf }};

// Gender Chart
new Chart(document.getElementById('genderChart'), {
type: 'bar',
data: {
labels: genderLabels,
datasets: [{
data: genderData,
backgroundColor: [
'rgba(54,162,235,0.6)',
'rgba(255,99,132,0.6)',
'rgba(75,192,192,0.6)'
]
}]
},
options: {
plugins: { legend: { display: false } },
scales: {
y: { beginAtZero: true, max: 100 }
}
}
});

// Emotion Chart
new Chart(document.getElementById('emotionChart'), {
type: 'bar',
data: {
labels: emotionLabels,
datasets: [{
data: emotionData,
backgroundColor: [
'rgba(255,99,132,0.6)',
'rgba(54,162,235,0.6)',
'rgba(255,206,86,0.6)'
]
}]
},
options: {
plugins: { legend: { display: false } },
scales: {
y: { beginAtZero: true, max: 100 }
}
}
});

</script>

</body>
</html>
