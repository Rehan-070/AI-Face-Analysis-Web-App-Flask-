<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Baby Result</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-[url('https://images.unsplash.com/photo-1638864616275-9f0b291a2eb6?fm=jpg&q=60&w=3000')] bg-cover bg-center bg-fixed">

<header class="absolute inset-x-0 top-0 z-50">
<nav class="flex items-center justify-between p-6 lg:px-8">
<div class="flex items-center">
<img class="h-8 rounded-full"
src="https://logomaker.designfreelogoonline.com/media/productdesigner/logo/resized/1286_bird-02.png">
<span class="text-transparent bg-clip-text bg-gradient-to-tr from-[#211f4e] to-[#1ec3c0] px-2 font-bold font-serif text-lg">
UR ~>
</span>
</div>
<a href="/" class="text-transparent bg-clip-text bg-gradient-to-tr from-[#ff5cf4] to-[#00fbff] uppercase font-extrabold text-sm">
Home
</a>
</nav>
</header>

<section class="pt-32 text-center">

<img src="/{{ image }}" class="w-40 h-40 rounded-full mx-auto border-4 border-white shadow-xl">

<h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-tr from-[#ff5cf4] to-[#00fbff] mt-6">
BABY ANALYSIS
</h1>

<!-- 3 COLUMN GRID -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-8 mt-16 px-12">

<!-- GENDER -->
<div class="bg-white p-6 rounded-xl shadow-2xl hover:shadow-blue-400 transition duration-300">
<h3 class="font-bold text-gray-700 mb-4 text-xl">Gender Analysis</h3>
<canvas id="genderChart"></canvas>
</div>

<!-- EMOTION -->
<div class="bg-white p-6 rounded-xl shadow-2xl hover:shadow-pink-400 transition duration-300">
<h3 class="font-bold text-gray-700 mb-4 text-xl">Emotion Analysis</h3>
<canvas id="emotionChart"></canvas>
</div>

<!-- RACE -->
<div class="bg-white p-6 rounded-xl shadow-2xl hover:shadow-green-400 transition duration-300">
<h3 class="font-bold text-gray-700 mb-4 text-xl">Race Analysis</h3>
<canvas id="raceChart"></canvas>
</div>

</div>

</section>

{% include 'footer.html' %}

<script>

// Safely convert Flask dict to JS object
const genderData = {{ result.gender | tojson }};
const emotionData = {{ result.emotion | tojson }};
const raceData = {{ result.race | tojson }};

// Chart rendering function
function renderChart(canvasId, labels, data, color) {
new Chart(document.getElementById(canvasId), {
type: 'bar',
data: {
labels: labels,
datasets: [{
data: data,
backgroundColor: color
}]
},
options: {
responsive: true,
plugins: { legend: { display: false } },
scales: {
y: { beginAtZero: true }
}
}
});
}

// Render charts
renderChart(
'genderChart',
Object.keys(genderData),
Object.values(genderData),
'rgba(54, 162, 235, 0.6)'
);

renderChart(
'emotionChart',
Object.keys(emotionData),
Object.values(emotionData),
'rgba(255, 99, 132, 0.6)'
);

renderChart(
'raceChart',
Object.keys(raceData),
Object.values(raceData),
'rgba(75, 192, 192, 0.6)'
);

</script>

</body>
</html>
